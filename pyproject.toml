[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "sam2_utils"
version = "0.1.0"
description = "Shared helpers for SAM2 experiments on Zhen Lab EM data."
requires-python = ">=3.9"
dependencies = [
    "numpy",
    "pandas",
    "opencv-python",
    "matplotlib",
    "Pillow",
    "psutil",
    "requests",
    "tqdm",
    # `progressbar2` is optional; setup.py uses a fallback if absent.
    # `torch` is intentionally NOT listed — install the CUDA build that
    # matches your environment from pytorch.org first.
]

[tool.setuptools.packages.find]
where = ["."]
include = ["sam2_utils*"]
